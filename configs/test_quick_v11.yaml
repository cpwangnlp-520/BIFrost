work_dir: /workspace/pku_percy/runs/test_quick_v11
experiment_name: test-quick-v11
project_name: BIF-Quick-V11

steps:
  build-pool:
    pool_type: pt
    total_tokens: 2M
    seed: 42
    min_chars: 200
    min_tokens: 50
    max_tokens: 512
    tokenizer_path: /workspace/pku_percy/models/pythia-70m-step1000
    calibrate_n: 10

    finetune:
      pool_type: target
      total_tokens: 1M
      domains: nemotron_math
      min_int_score: 3
      min_chars: 200
      min_tokens: 50
      max_tokens: 512
      tokenizer_path: /workspace/pku_percy/models/pythia-70m-step1000
      calibrate_n: 10

  prepare-finetune:
    tokenizer_path: /workspace/pku_percy/models/pythia-70m-step1000
    train_ratio: 0.7
    query_ratio: 0.1
    val_ratio: 0.1
    test_ratio: 0.1
    seed: 42
    min_chars: 100
    min_token_count: 50
    max_token_count: 512
    min_int_score: 3
    min_language_score: 0.8

  train:
    base_model_path: /workspace/pku_percy/models/pythia-70m-step1000
    tokenizer_path: /workspace/pku_percy/models/pythia-70m-step1000
    num_train_epochs: 0.5
    learning_rate: 5e-5
    per_device_train_batch_size: 8
    per_device_eval_batch_size: 64
    gradient_accumulation_steps: 4
    max_length: 256
    target_num_checkpoints: 3
    warmup_ratio: 0.03
    logging_steps: 1
    eval_steps: 20
    bf16: true

  run-bif:
    num_chains: 2
    draws_per_chain: 20
    burn_in: 2
    thinning: 2
    train_batch_size: 32
    eval_batch_size: 256
    pool_eval_subset: 1000
    nproc_per_node: 1
    dtype: bfloat16

  analyze-bif:
    score_col: raw_cov_avg_over_queries
    top_k: 200

  extract-top:
    top_k: 200
    score_cols:
      - raw_cov_avg_over_queries
      - raw_cov_avg_over_queries

  schedule-compare:
    schedules:
      - sequential
      - mixed
    replay_modes:
      - selected
      - random
    mix_ratios:
      - 0.2
    num_train_epochs: 0.5
    learning_rate: 5e-5
    per_device_train_batch_size: 8
    per_device_eval_batch_size: 64
    gradient_accumulation_steps: 4
    max_length: 256
    logging_steps: 1
    eval_steps: 20
    bf16: true
    seed: 42
