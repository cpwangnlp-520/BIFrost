# ═══════════════════════════════════════════════════════════════════════════════
# BIFrost Pipeline — Complete Parameter Reference
# ═══════════════════════════════════════════════════════════════════════════════
#
# All keys are optional unless marked [required].  Default values are shown
# inline.  Global keys (tokenizer_path, base_model_path, cuda_visible_devices)
# are inherited by all steps that need them.
#
# Usage:
#   bifrost pipeline run --config my_experiment.yaml
#   bifrost pipeline run --config my_experiment.yaml --from run-bif --resume
#   bifrost pipeline run --config my_experiment.yaml --new-run
#   bifrost pipeline status --config my_experiment.yaml
# ═══════════════════════════════════════════════════════════════════════════════

# ─── Global ────────────────────────────────────────────────────────────────────
# [required] Output directory for all pipeline artifacts
work_dir: /runs/my_experiment

# SwanLab experiment name (default: "pipeline_<work_dir_basename>")
experiment_name: my-experiment

# SwanLab project name (default: "bif")
project_name: bifrost

# Global tokenizer — inherited by build-pool / prepare-finetune / train / run-bif
tokenizer_path: /models/pythia-70m

# Global base model — inherited by train / schedule-compare
base_model_path: /models/pythia-70m

# GPU visibility (set before any subprocess)
cuda_visible_devices: "0,1,2,3,4,5,6,7"

# Reuse shared data from a previous run (symlinks pool/, train/, bif_traces/, etc.)
# When set, steps 1-6 are auto-completed; only schedule-compare/analyze run.
# data_root: /runs/previous_experiment

# ═══════════════════════════════════════════════════════════════════════════════
steps:

  # ─── 1. build-pool ─────────────────────────────────────────────────────────
  # Build PT pool + optional finetune pool.
  # Auto-skips if pt_pool.jsonl (+ finetune_pool.jsonl) already exist.
  #
  # Three mutually exclusive modes for PT pool:
  #   A) pool_jsonl       — skip build, symlink an existing file
  #   B) data_sources     — custom files with explicit paths
  #   C) total_tokens / domains / ratios / n_<domain> — standard build-pool-v2
  build-pool:

    # ── Mode A: symlink existing pool ──────────────────────────────────────
    # pool_jsonl: /data/existing/pt_pool.jsonl

    # ── Mode B: custom data sources ────────────────────────────────────────
    # data_sources:
    #   - path: /data/my_math.parquet
    #     text_col: text
    #     source_name: my_math
    #     n: 3000

    # ── Mode C: standard build-pool-v2 ─────────────────────────────────────
    # Available domains: fineweb_edu, c4, wikipedia, slimpajama, finemath,
    #                    nemotron_math, octothinker, starcoder, flan, sft_chat
    pool_type: pt                          # pt | target | sft (default: "pt")
    total_tokens: 4M                       # token budget (e.g. 4M, 8M)
    domains: finemath                      # comma-separated domain subset
    ratios: "finemath:1.0"                 # domain:ratio pairs (optional)
    # n_nemotron_math: 3000                # explicit per-domain counts (optional)

    # ── Filtering (build-pool-v2) ──────────────────────────────────────────
    min_chars: 600                         # min character length (default: 100)
    min_tokens: 512                        # min token length (default: 50)
    max_tokens: 1024                       # max token length (default: 4096)
    min_int_score: 4                       # min int_score for fineweb_edu/finemath (default: 0)
    min_lang_score: 0.8                    # min language score (default: 0.0)
    calibrate_n: 100                       # samples for token-ratio calibration (default: 100)
    seed: 42

    # ── Finetune pool (nested sub-section) ─────────────────────────────────
    # If present, also builds finetune_pool.jsonl.
    # Supports same keys as PT pool (pool_type, total_tokens, domains, etc.)
    # plus finetune_pool_jsonl to skip/symlink.
    finetune:
      pool_type: target
      total_tokens: 2M
      domains: nemotron_math
      min_int_score: 3
      min_chars: 600
      min_tokens: 512
      max_tokens: 1024
      calibrate_n: 100
      # finetune_pool_jsonl: /data/existing/finetune_pool.jsonl

  # ─── 2. prepare-finetune ─────────────────────────────────────────────────
  # Split finetune pool into train/query/val/test.
  # Auto-skips if all 4 splits already exist.
  # Input is auto-resolved from finetune_pool.jsonl unless input_path is set.
  prepare-finetune:
    # input_path: /data/custom_input.jsonl
    train_ratio: 0.7                       # default: 0.7
    query_ratio: 0.1                       # default: 0.1
    val_ratio: 0.1                         # default: 0.1
    test_ratio: 0.1                        # default: 0.1
    # train_n: 2000                         # explicit count (overrides ratio)
    # query_n: 128
    # val_n: 128
    # test_n: 128
    min_chars: 600                         # default: 100
    min_token_count: 512                   # default: 200
    max_token_count: 1024                  # default: 2000
    min_int_score: 3                       # default: 4
    min_language_score: 0.8                # default: 0.9
    # require_english: true
    seed: 42

  # ─── 3. train ────────────────────────────────────────────────────────────
  # Train base model on finetune train split, saving periodic checkpoints.
  # Auto-skips if final_model/ or checkpoint-1/ already exists.
  train:
    num_train_epochs: 1                    # default: 1.0
    learning_rate: 2e-4                    # default: 2e-5
    per_device_train_batch_size: 8         # default: 8
    per_device_eval_batch_size: 64         # default: 8
    gradient_accumulation_steps: 1         # default: 4
    max_length: 1024                       # default: 512
    weight_decay: 0.01                     # default: 0.01
    warmup_ratio: 0.03                     # default: 0.03
    target_num_checkpoints: 3              # default: 6
    logging_steps: 5                       # default: 10
    eval_steps: 25
    bf16: true                             # default: false
    gradient_checkpointing: true           # default: false
    nproc_per_node: 2                      # default: 1
    master_port: 29500

  # ─── 4. run-bif ──────────────────────────────────────────────────────────
  # SGLD sampling to collect BIF traces at each checkpoint.
  run-bif:
    max_length: 1024                       # default: 1024
    num_chains: 1                          # default: 4
    draws_per_chain: 100                   # default: 60
    burn_in: 5                             # default: 0
    thinning: 1                            # default: 1
    lr: 1e-5                               # default: 5e-6
    gamma: 1e-4                            # default: 1e-3
    noise_scale: 2.0                       # default: 1.0
    # beta: 1.0                            # default: 1.0
    # grad_clip: 1.0                       # default: None
    train_batch_size: 32                   # default: 16
    eval_batch_size: 64                    # default: 32
    pool_eval_subset: 0                    # 0 = evaluate full pool
    dtype: bfloat16                        # float32 | float16 | bfloat16
    nproc_per_node: 1
    master_port: 29501

  # ─── 5. analyze-bif ─────────────────────────────────────────────────────
  # Compute BIF scores from SGLD traces.
  analyze-bif:
    score_col: raw_cov_avg_over_queries    # default: "raw_cov_avg_over_queries"
    top_k: 500                             # default: 500

  # ─── 6. extract-top ─────────────────────────────────────────────────────
  # Extract top-K samples by BIF score from PT pool.
  extract-top:
    top_k: 500                             # should match analyze-bif.top_k
    score_cols:
      - raw_cov_avg_over_queries
    # checkpoint: checkpoint-42            # pin a specific checkpoint

  # ─── 7. schedule-compare ────────────────────────────────────────────────
  # Train with replay at various mix ratios / schedules / modes.
  # Auto-inherits bf16, gradient_checkpointing, max_length, etc. from train.
  schedule-compare:
    schedules:
      - sequential
      - mixed
    replay_modes:
      - selected
      - random
    mix_ratios:
      - 0.2
    num_train_epochs: 1
    learning_rate: 2e-4
    per_device_train_batch_size: 8
    per_device_eval_batch_size: 64
    gradient_accumulation_steps: 1
    max_length: 1024
    logging_steps: 5
    eval_steps: 25
    bf16: true
    gradient_checkpointing: true
    nproc_per_node: 2
    master_port: 29502
    seed: 42

  # ─── 8. schedule-analyze ────────────────────────────────────────────────
  # Analyze schedule-compare results. No user-configurable parameters.
  schedule-analyze: {}
