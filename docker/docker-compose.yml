version: "3.8"

services:
  bif:
    build:
      context: .
      dockerfile: Dockerfile
    image: bif:latest
    container_name: bif
    shm_size: "32g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      stack:
        soft: 67108864
        hard: 67108864
    volumes:
      - ./data:/workspace/bif/data
      - ./outputs:/workspace/bif/outputs
      - ./models:/workspace/bif/models
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0,1,2,3
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
